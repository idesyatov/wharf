services:
  db:
    image: redis:alpine
    ports:
      - "6380:6379"
    volumes:
      - db-data:/data
    restart: unless-stopped

  cache:
    image: redis:alpine
    ports:
      - "6381:6379"
    volumes:
      - cache-data:/data
    restart: unless-stopped
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru

volumes:
  db-data:
  cache-data:

networks:
  backend:
    driver: bridge
