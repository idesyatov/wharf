services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    tty: true
    stdin_open: true

volumes:
  go-mod-cache:
  go-build-cache:
